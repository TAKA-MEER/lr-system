services:
  minutes-app:
    build: ./app
    container_name: minutes-app
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - ./output:/output
      - ./models:/models
    environment:
      - OLLAMA_HOST=http://minutes-ollama:11434
      - HF_HOME=/models
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      - minutes-ollama
    restart: unless-stopped
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  minutes-ollama:
    image: ollama/ollama:latest
    container_name: minutes-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama-data:
